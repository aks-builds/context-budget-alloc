name: Release

on:
  push:
    branches: ['__never__']  # forces GitHub to index this workflow on first push
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options: [prerelease, patch, minor, major]
        default: patch
      preid:
        description: Pre-release ID (only for prerelease)
        required: false
        default: beta

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.APPROVER_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Set git identity
        run: |
          git config user.name "aks-builds"
          git config user.email "its.aks@outlook.com"

      - name: Bump version
        id: bump
        run: |
          if [ "${{ inputs.bump }}" = "prerelease" ]; then
            npm version prerelease --preid=${{ inputs.preid }} --no-git-tag-version
          else
            npm version ${{ inputs.bump }} --no-git-tag-version
          fi
          echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Roll CHANGELOG
        run: |
          DATE=$(date +%Y-%m-%d)
          VERSION="${{ steps.bump.outputs.version }}"
          sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n## [${VERSION}] - ${DATE}/" CHANGELOG.md

      - name: Push release branch and open PR
        run: |
          BRANCH="release/v${{ steps.bump.outputs.version }}"
          git checkout -b "$BRANCH"
          git add package.json CHANGELOG.md
          git commit -m "release: v${{ steps.bump.outputs.version }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "release: v${{ steps.bump.outputs.version }}" \
            --body "Automated release bump to v${{ steps.bump.outputs.version }}" \
            --base master \
            --head "$BRANCH"
          gh pr merge --auto --squash
        env:
          GH_TOKEN: ${{ secrets.APPROVER_PAT }}
